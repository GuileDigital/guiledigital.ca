<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guile Digital Security</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #071f46;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .card {
      max-width: 850px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 50px 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .logo {
      width: 320px;
      max-width: 90%;
      background: white;
      padding: 15px;
      border-radius: 14px;
      margin-bottom: 30px;
    }

    .badge {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(80, 140, 255, 0.25);
      border: 1px solid rgba(150, 190, 255, 0.45);
      color: #b8d1ff;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 48px;
      margin: 0 0 20px;
    }

    p {
      font-size: 22px;
      line-height: 1.6;
      color: #d7e4ff;
      margin-bottom: 30px;
    }

    .services {
      margin-bottom: 35px;
    }

    .service {
      display: inline-block;
      margin: 6px;
      padding: 10px 16px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .button {
      display: inline-block;
      background: #2f64c8;
      color: white;
      padding: 15px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .button:hover {
      background: #477ee5;
    }

    .footer {
      margin-top: 40px;
      color: #aebfe4;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 34px;
      }

      p {
        font-size: 18px;
      }

      .logo {
        width: 260px;
      }
    }
  </style>
</head>

<body>
  <div class="card">

    <img src="logo.png" alt="Guile Digital Security Logo" class="logo">

    <br>

    <div class="badge">Website Coming Soon</div>

    <p>
      Professional Microsoft 365, cybersecurity, and IT consulting services.
      <br>
      A new website is currently being built.
    </p>

    <div class="services">
      <span class="service">Microsoft 365 Security</span>
      <span class="service">Defender XDR</span>
      <span class="service">Entra ID</span>
      <span class="service">Microsoft Sentinel</span>
      <span class="service">IT Consulting</span>
    </div>

    <a href="mailto:curtis@guiledigital.ca" class="button">Contact Us</a>

    <div class="footer">
      © 2026 Guile Digital Security. All rights reserved.
    </div>
    
  </div>
</body>
</html>
