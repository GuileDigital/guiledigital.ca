<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Guile Digital Security</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(47, 100, 200, 0.25), transparent 35%),
        linear-gradient(135deg, #06152f 0%, #0b234d 50%, #081a38 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 850px;
      padding: 50px 30px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    .logo {
      width: 360px;
      max-width: 90%;
      height: auto;
      margin-bottom: 35px;
      border-radius: 12px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
    }

    .badge {
      display: inline-block;
      margin-bottom: 22px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(115, 167, 255, 0.15);
      border: 1px solid rgba(115, 167, 255, 0.35);
      color: #9fc2ff;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.03em;
    }

    .subtitle {
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      color: #d9e6ff;
      line-height: 1.7;
      margin: 0 auto 32px;
      max-width: 680px;
    }

    .services {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 34px;
    }

    .service {
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #eaf1ff;
